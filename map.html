<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#E9EDEC" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0F1817" media="(prefers-color-scheme: dark)">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&amp;family=IBM+Plex+Mono:wght@400;500&amp;family=Inter:wght@400;500;600&amp;display=swap">
<link rel="stylesheet" href="./nav.css">
<link rel="icon" type="image/svg+xml" href="./icon.svg">
<link rel="apple-touch-icon" href="./icon-180.png">
<title>AKM — Map</title>
<meta name="description" content="An offline map of Liesing and Klebas — venues, lodging, and food, and the walk between them.">
<meta property="og:site_name" content="AKM">
<meta property="og:type" content="website">
<meta property="og:title" content="AKM — Map">
<meta property="og:description" content="An offline map of Liesing and Klebas — venues, lodging, and food, and the walk between them.">
<meta property="og:url" content="https://jsundram.github.io/AKM/map.html">
<meta property="og:image" content="https://jsundram.github.io/AKM/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="Dawn over an alpine valley — snow-capped peak, meadows, and the AKM wordmark">
<meta name="twitter:card" content="summary_large_image">
<style>
  :root{
    --paper:#E9EDEC; --haze:#DFE5E3; --ink:#172526; --muted:#5F7072; --faint:#8C9A9B;
    --line:#CBD3D1; --warm-line:#E2D2B2; --brass:#9A6B22; --brass-deep:#7C5417;
    /* map layers — quiet alpine basemap, drawn not tiled */
    --valley:#E2E7E4; --bldg:#D2D9D6; --bldg-line:#C2CBC8;
    --road:#AEB8B5; --road-major:#7E8B89; --road-faint:#C3CCC9;
    --water:#A9CADA; --water-line:#7FA9BE; --green:#CFE0CF;
    /* POI accents: Jason's base is the only warm/brass one; everything else stays cool */
    --pin-lodge:#4C7CA6; --pin-venue:#5E8B45; --pin-food:#A65A3C; --gold:#9A6B22;   /* lodge=sky-blue, venue=meadow-green: distinct hues, not two muted teals */
    --fp-lodge:rgba(76,124,166,.32); --fp-venue:rgba(94,139,69,.32);
    --fp-food:rgba(166,90,60,.30); --fp-mine:rgba(154,107,34,.40);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--paper);color:var(--ink);font-family:"Inter",system-ui,sans-serif;line-height:1.4;
    display:flex;flex-direction:column;overflow:hidden;
    padding:calc(14px + env(safe-area-inset-top)) calc(12px + env(safe-area-inset-right))
            calc(10px + env(safe-area-inset-bottom)) calc(12px + env(safe-area-inset-left))}

  .top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex:none;min-width:0}
  .id{min-width:0}
  h1{font-family:"Fraunces",serif;font-weight:500;font-size:24px;letter-spacing:-.015em;line-height:1}
  .sub{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.06em;color:var(--faint);
    margin-top:3px;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .back{flex:none;display:inline-flex;align-items:center;gap:6px;font-family:"IBM Plex Mono",monospace;
    font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);text-decoration:none;
    border:1px solid var(--line);border-radius:7px;padding:5px 10px}
  .back:hover{color:var(--brass-deep);border-color:var(--warm-line)}

  .legend{display:flex;flex-wrap:wrap;gap:6px 14px;margin:10px 0 8px;flex:none;
    font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.03em;color:var(--muted)}
  .legend b{display:inline-flex;align-items:center;gap:6px;font-weight:400}
  /* swatches mirror the pins themselves: same size feel, paper border + soft shadow, no hard ring */
  .legend i{width:13px;height:13px;border-radius:50%;border:2px solid var(--paper);box-shadow:0 1px 2px rgba(20,30,30,.3)}
  .legend .l-mine{background:var(--gold)} .legend .l-lodge{background:var(--pin-lodge)}
  .legend .l-venue{background:var(--pin-venue)} .legend .l-food{background:var(--pin-food)}
  .legend .l-both{background:linear-gradient(135deg,var(--pin-lodge) 50%,var(--pin-food) 50%)}
  .legend .l-both-vl{background:linear-gradient(135deg,var(--pin-venue) 50%,var(--pin-lodge) 50%)}

  #map{position:relative;flex:1;min-height:0;overflow:hidden;border:1px solid var(--line);
    border-radius:13px;background:var(--valley);cursor:grab;touch-action:none}
  #map.drag{cursor:grabbing}
  #svg{position:absolute;inset:0;width:100%;height:100%;display:block}
  #svg .bldg{fill:var(--bldg);stroke:var(--bldg-line);stroke-width:.6px;vector-effect:non-scaling-stroke}
  #svg .green{fill:var(--green);stroke:none}
  #svg .body{fill:var(--water);stroke:var(--water-line);stroke-width:1px;vector-effect:non-scaling-stroke}
  #svg .road{fill:none;stroke:var(--road);stroke-width:2px;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke}
  #svg .primary{stroke:var(--road-major);stroke-width:4px}
  #svg .minor{stroke-width:2.6px}
  #svg .service{stroke-width:1.5px;stroke:var(--road-faint)}
  #svg .track{stroke-width:1.4px;stroke:var(--road-faint);stroke-dasharray:5 4}
  #svg .path{stroke-width:1.2px;stroke:var(--faint);stroke-dasharray:1.5 4}
  #svg .river{fill:none;stroke:var(--water);stroke-width:5px;stroke-linecap:round;vector-effect:non-scaling-stroke}
  #svg .stream{fill:none;stroke:var(--water-line);stroke-width:2px;stroke-linecap:round;vector-effect:non-scaling-stroke}
  #svg .fp{stroke-width:1.4px;vector-effect:non-scaling-stroke}
  #svg .fp-lodging{fill:var(--fp-lodge);stroke:var(--pin-lodge)}   /* class is fp-<cat>; "lodging", not "lodge" */
  #svg .fp-venue{fill:var(--fp-venue);stroke:var(--pin-venue)}
  #svg .fp-food{fill:var(--fp-food);stroke:var(--pin-food)}
  #svg .fp-mine{fill:var(--fp-mine);stroke:var(--brass-deep);stroke-width:2px}
  /* dual-role footprints wear the same diagonal split as their pin (gradient stops via CSS vars) */
  #svg .s-lodging{stop-color:var(--pin-lodge)} #svg .s-venue{stop-color:var(--pin-venue)} #svg .s-food{stop-color:var(--pin-food)}
  #svg .fp-split{fill-opacity:.3}   /* fill + stroke set inline to the (cat,also) split gradient */
  #svg .rl,#svg .ae{display:none}
  #svg image{image-rendering:auto}
  .mode-relief #svg .rl{display:block}
  .mode-relief #svg .bldg{fill-opacity:.5}
  .mode-aerial #svg .ae{display:block}
  .mode-aerial #svg .green,.mode-aerial #svg .body,.mode-aerial #svg .bldg{display:none}
  .mode-aerial #svg .road{stroke:rgba(255,255,255,.55)}
  .mode-aerial #svg .primary{stroke:rgba(255,255,255,.78)}
  .mode-aerial #svg .stream,.mode-aerial #svg .river{opacity:.8}
  .mode-aerial #svg .fp{fill:none}
  .mode-aerial #svg .fp-mine{fill:var(--fp-mine)}
  #svg .glab{paint-order:stroke;stroke:var(--paper);stroke-width:3px;text-anchor:middle}
  #svg .glab.hamlet{fill:var(--muted);font-family:"Fraunces",serif;font-size:17px;letter-spacing:.02em;opacity:.7}
  #svg .glab.water{fill:var(--water-line);font-style:italic;font-size:12px;letter-spacing:.04em;opacity:.9}
  #svg .glab.road{fill:var(--muted);font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.12em;opacity:.82}
  #svg .rdpath{fill:none;stroke:none}
  .mode-aerial #svg .glab{fill:#fff;stroke:rgba(0,0,0,.6)}
  .mode-aerial #svg .glab.water{fill:#cfe9f5}
  #svg .rl{filter:sepia(.12) saturate(.85) brightness(1.02)}   /* warm the grayscale relief */

  .markers{position:absolute;inset:0;pointer-events:none}
  .markers.off{display:none}
  #svg .bldg.has{cursor:pointer}
  #svg .bldg.has:hover{fill:var(--bldg-line);stroke:var(--muted);stroke-width:1.1px}   /* addressed → tappable */
  #binfo{position:absolute;z-index:7;transform:translate(-50%,calc(-100% - 11px));pointer-events:none;
    max-width:220px;padding:5px 9px;border:1px solid var(--line);border-radius:7px;
    background:rgba(249,250,249,.97);box-shadow:0 2px 8px rgba(20,30,30,.2);
    font-size:11.5px;line-height:1.3;color:var(--ink);white-space:nowrap}
  #binfo b{display:block;font-weight:600}
  #binfo span{color:var(--muted);font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.02em}
  .mk{position:absolute;display:flex;align-items:center;gap:6px;transform:translate(-8px,-8px);white-space:nowrap}
  .mk.rev{flex-direction:row-reverse;transform:translate(calc(-100% + 8px),-8px)}
  .dot{flex:0 0 auto;width:16px;height:16px;border-radius:50%;border:2px solid var(--paper);
    background:var(--pin-lodge);box-shadow:0 1px 3px rgba(20,30,30,.4);pointer-events:auto;cursor:pointer;touch-action:none}
  .cat-venue .dot{background:var(--pin-venue)} .cat-food .dot{background:var(--pin-food)}
  /* a place with two roles (hotel + restaurant, hall + gasthaus) wears both colours */
  .cat-lodging.also-food:not(.mine) .dot{background:linear-gradient(135deg,var(--pin-lodge) 50%,var(--pin-food) 50%)}
  .cat-venue.also-lodging:not(.mine) .dot{background:linear-gradient(135deg,var(--pin-venue) 50%,var(--pin-lodge) 50%)}
  .mk.mine .dot{width:18px;height:18px;background:var(--gold);box-shadow:0 0 0 3px var(--valley),0 1px 4px rgba(20,30,30,.45)}
  .lab{display:none;padding:3px 6px 4px;border:1px solid var(--line);border-radius:5px;color:var(--ink);
    background:rgba(249,250,249,.94);box-shadow:0 1px 3px rgba(20,30,30,.14);
    font-size:11.5px;font-weight:500;line-height:1.2}
  .lab .code{display:block;margin-top:1px;font-family:"IBM Plex Mono",monospace;font-size:8.5px;
    font-weight:500;letter-spacing:.1em;color:var(--muted)}
  .mk.mine .lab{display:block;border-color:var(--warm-line);color:var(--brass-deep);background:#F4ECDD}
  .mk:hover .lab,.markers.zoom .lab{display:block}
  .mk.on .lab{display:block!important}    /* tap a pin to force its label on … */
  .mk.off .lab{display:none!important}    /* … or off, regardless of zoom/hover/mine */
  .mk.on{z-index:3}
  .mk.focus{z-index:5}                    /* arrived via a "→ map" link: pulse the dot to find it */
  .mk.focus .dot{animation:pinfocus 1.3s ease-out infinite}
  @keyframes pinfocus{from{box-shadow:0 0 0 0 rgba(154,107,34,.5),0 1px 3px rgba(20,30,30,.4)}
    to{box-shadow:0 0 0 15px rgba(154,107,34,0),0 1px 3px rgba(20,30,30,.4)}}

  .me{position:absolute;z-index:4;transform:translate(-50%,-50%);pointer-events:none}
  .me i{display:block;width:15px;height:15px;border-radius:50%;background:#1A73E8;
    border:2.5px solid #fff;box-shadow:0 0 0 1px rgba(20,30,30,.25),0 1px 5px rgba(20,40,90,.55)}
  .me .acc{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);border-radius:50%;
    background:rgba(26,115,232,.1);border:1px solid rgba(26,115,232,.32);pointer-events:none}
  .me::before{content:"";position:absolute;left:50%;top:50%;width:15px;height:15px;margin:-7.5px 0 0 -7.5px;
    border-radius:50%;background:#1A73E8;opacity:.35;animation:mepulse 2.4s ease-out infinite}
  @keyframes mepulse{to{transform:scale(3.4);opacity:0}}

  .ctl{position:absolute;z-index:6;top:12px;right:12px;display:grid;overflow:hidden;
    border:1px solid var(--line);border-radius:8px;background:var(--paper);box-shadow:0 2px 8px rgba(20,30,30,.16)}
  .ctl button{width:38px;height:38px;display:grid;place-items:center;border:0;background:var(--paper);
    color:var(--ink);font:inherit;font-size:19px;cursor:pointer}
  .ctl button+button{border-top:1px solid var(--line)}
  .ctl button:hover{background:var(--haze)}
  .ctl button.on{color:#1A73E8}
  .tl{position:absolute;z-index:6;top:12px;left:12px;display:flex;flex-direction:column;gap:8px;align-items:flex-start}
  .seg{display:inline-flex;overflow:hidden;border:1px solid var(--line);border-radius:8px;
    background:var(--paper);box-shadow:0 1px 3px rgba(20,30,30,.12)}
  .seg button{border:0;background:var(--paper);color:var(--muted);font:inherit;font-size:11px;font-weight:600;
    letter-spacing:.02em;padding:7px 11px;cursor:pointer}
  .seg button+button{border-left:1px solid var(--line)}
  .seg button.on{color:var(--brass-deep);background:#EFE2C8}
  .pins{display:inline-flex;align-items:center;gap:7px;height:32px;padding:0 11px;border:1px solid var(--line);
    border-radius:8px;background:var(--paper);color:var(--ink);font:inherit;font-size:12px;font-weight:600;
    cursor:pointer;box-shadow:0 1px 3px rgba(20,30,30,.12)}
  .pins .pd{width:8px;height:8px;border-radius:50%;background:var(--gold)}
  .pins[aria-pressed="false"]{color:var(--faint)} .pins[aria-pressed="false"] .pd{background:var(--faint)}
  .north{position:absolute;z-index:5;left:14px;bottom:12px;display:grid;justify-items:center;gap:1px;
    color:var(--muted);font-family:"IBM Plex Mono",monospace;font-size:10px;pointer-events:none;
    text-shadow:0 1px 0 var(--paper)}
  .north i{width:0;height:0;border-right:5px solid transparent;border-left:5px solid transparent;
    border-bottom:17px solid var(--muted)}
  .meta{position:absolute;z-index:5;right:12px;bottom:11px;display:grid;justify-items:end;gap:4px;
    font-family:"IBM Plex Mono",monospace;font-size:9.5px;color:var(--muted);text-shadow:0 1px 0 var(--paper)}
  .meta .sl{height:5px;border:solid var(--muted);border-width:0 1px 1px}
  .meta a{color:inherit}

  footer{flex:none;margin-top:8px;display:flex;justify-content:space-between;gap:12px;align-items:center;
    font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.04em;color:var(--faint)}

  @media (prefers-color-scheme: dark){
    :root{ --paper:#0F1817; --haze:#172221; --ink:#E9EEEC; --muted:#A6B5B4; --faint:#869897;
      --line:#2C3938; --warm-line:#4A3D23; --brass:#D9A24C; --brass-deep:#E8C481;
      --valley:#141E1D; --bldg:#26302F; --bldg-line:#313D3C;
      --road:#52605E; --road-major:#7D8E8C; --road-faint:#3A4644;
      --water:#3A6276; --water-line:#5C8AA1; --green:#1C2A23;
      --pin-lodge:#78ABD2; --pin-venue:#88BA60; --pin-food:#C8825E; --gold:#D9A24C;
      --fp-lodge:rgba(120,171,210,.22); --fp-venue:rgba(136,186,96,.22);
      --fp-food:rgba(200,130,94,.20); --fp-mine:rgba(217,162,76,.26); }
    .lab{background:rgba(23,34,33,.95)} .mk.mine .lab{background:#272015}
    #binfo{background:rgba(23,34,33,.96)}
    .pins,.ctl button,.seg button{background:var(--haze)} .ctl button:hover{background:#202c2b}
    .seg button.on{background:#2E2616} .seg button{color:var(--faint)}
    #svg .rl{filter:brightness(.52) contrast(1.08) saturate(.8)}   /* dim the relief on a dark page */
  }
</style>
</head>
<body>
  <header class="apphead">
    <a class="wordmark" href="./about.html" aria-label="About AKM"><span class="full">AlpenKammerMusik</span><span class="abbr">AKM</span></a>
    <nav><a href="./index.html">Today</a><span aria-current="page">Map</span><a href="./roster.html">Roster</a><a href="./network.html">Network</a></nav>
  </header>
  <div class="top">
    <div class="id">
      <h1>Liesing &amp; Klebas</h1>
      <div class="sub">lodgings · venues · food</div>
    </div>
  </div>

  <div class="legend">
    <b><i class="l-mine"></i>your base</b>
    <b><i class="l-lodge"></i>lodging</b>
    <b><i class="l-venue"></i>venue</b>
    <b><i class="l-food"></i>food</b>
    <b><i class="l-both"></i>lodging + food</b>
    <b><i class="l-both-vl"></i>venue + lodging</b>
  </div>

  <div id="map" aria-label="Map of Liesing and Klebas">
    <svg id="svg" aria-hidden="true"><defs><clipPath id="clip"><rect id="cliprect" x="0" y="0"/></clipPath></defs><g id="scene" clip-path="url(#clip)"></g></svg>
    <div class="markers" id="markers"></div>
    <div id="binfo" hidden></div>
    <div class="me" id="me" hidden><span class="acc"></span><i></i></div>
    <div class="tl">
      <div class="seg" id="seg" role="group" aria-label="Base layer">
        <button data-m="map" class="on" type="button">Map</button>
        <button data-m="relief" type="button">Relief</button>
        <button data-m="aerial" type="button">Aerial</button>
      </div>
      <button class="pins" id="pins" type="button" aria-pressed="true"><span class="pd"></span>Pins</button>
    </div>
    <div class="ctl">
      <button id="in" type="button" title="Zoom in" aria-label="Zoom in">+</button>
      <button id="out" type="button" title="Zoom out" aria-label="Zoom out">−</button>
      <button id="fit" type="button" title="Reset" aria-label="Reset" style="font-size:15px">⌂</button>
      <button id="loc" type="button" title="My location" aria-label="My location" style="font-size:17px">◎</button>
    </div>
    <div class="north" aria-hidden="true"><i></i>N</div>
    <div class="meta">
      <span id="sl-lab">100 m</span><span class="sl" id="sl"></span>
      <span id="attr"></span>
    </div>
  </div>

  <footer><span>find your way around the village</span></footer>
<script src="./roster-data.js"></script>
<script src="./map.js"></script>
<script src="./ping.js"></script>
</body>
</html>
