<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#E9EDEC" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0F1817" media="(prefers-color-scheme: dark)">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&amp;family=IBM+Plex+Mono:wght@400;500&amp;family=Inter:wght@400;500;600&amp;display=swap">
<link rel="icon" type="image/svg+xml" href="./icon.svg">
<link rel="apple-touch-icon" href="./icon-180.png">
<title>AKM — Roster</title>
<style>
  :root{
    --paper:#E9EDEC; --ink:#172526; --muted:#5F7072; --faint:#8C9A9B;
    --line:#CBD3D1; --warm-line:#E2D2B2; --brass:#9A6B22; --brass-deep:#7C5417;
    /* the table is a "printed sheet" — fixed light colors in both themes so the hotel pastels read */
    --doc:#FCFDFD; --doc-ink:#17212B; --doc-line:#CAD2D9; --doc-box:#82909C; --doc-head:#3E556B;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--paper);color:var(--ink);font-family:"Inter",system-ui,sans-serif;line-height:1.4;
    display:flex;justify-content:center;
    padding:calc(20px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right))
            calc(40px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left))}
  .sheet{width:100%;max-width:560px}

  .back{display:inline-flex;align-items:center;gap:6px;font-family:"IBM Plex Mono",monospace;font-size:11px;
    letter-spacing:.06em;text-transform:uppercase;color:var(--muted);text-decoration:none;
    white-space:nowrap;border:1px solid var(--line);border-radius:7px;padding:5px 10px}
  .back:hover{color:var(--brass-deep);border-color:var(--warm-line)}
  h1{font-family:"Fraunces",serif;font-weight:500;font-size:30px;letter-spacing:-.015em;margin:16px 0 2px}
  .sub{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.04em;color:var(--faint);margin-bottom:16px}

  .doc{background:var(--doc);color:var(--doc-ink);border:1px solid var(--doc-box);border-radius:10px;overflow:hidden}
  table{width:100%;border-collapse:collapse;table-layout:fixed}
  thead th{background:var(--doc-head);color:#fff;font-weight:600;font-size:11px;letter-spacing:.02em;
    text-align:left;padding:6px 10px;cursor:pointer;user-select:none;white-space:nowrap}
  thead th .ar{font-size:8px;margin-left:3px;color:#AEBDC9}
  col.c-n{width:6%} col.c-nm{width:33%} col.c-wa{width:7%} col.c-in{width:15%} col.c-ty{width:12%} col.c-ht{width:27%}
  th.wa-h{cursor:default;text-align:center;padding-left:0;padding-right:0}
  th.wa-h svg{display:block;margin:0 auto}
  td.wa-cell{text-align:center;padding-left:0;padding-right:0}
  .nl{color:#2A6F97;text-decoration:underline;text-decoration-thickness:.6px;text-underline-offset:1.5px}
  th.n,td.n{text-align:right;font-family:"IBM Plex Mono",monospace;white-space:nowrap;padding-left:5px;padding-right:6px}
  td.ty{font-family:"IBM Plex Mono",monospace;font-size:10.5px;font-weight:500;letter-spacing:.04em;color:#4A5763}
  td{padding:3.5px 10px;font-size:12.5px;line-height:1.3;border-top:1px solid var(--doc-line);
    vertical-align:top;color:var(--doc-ink);overflow-wrap:break-word}
  td.n{color:#56636E;font-size:11px}
  td.in{font-family:"IBM Plex Mono",monospace;font-size:11.5px;color:#3A4650;white-space:nowrap}
  td.ht{font-size:11.5px;color:#3A4650}
  td.ht a.maplink{color:#2A6F97;text-decoration:none;cursor:pointer;display:inline-flex;align-items:baseline;gap:3px}
  td.ht a.maplink:hover{text-decoration:underline}
  td.ht a.maplink .pin{flex:none;opacity:.7;transform:translateY(1px)}
  tr.exp{cursor:pointer}
  .caret{float:right;color:var(--doc-box);transition:transform .15s ease;font-size:13px;line-height:1;margin-left:6px}
  tr.open .caret{transform:rotate(90deg)}
  tr.detail td{border-top:0;padding:0 12px 6px}
  .dl{display:flex;gap:9px;font-size:11.5px;line-height:1.35;margin-top:3px}
  .dl .k{flex:none;width:50px;font-family:"IBM Plex Mono",monospace;font-size:8.5px;letter-spacing:.1em;
    text-transform:uppercase;color:#7A8794;padding-top:2px}
  .dl .v{color:var(--doc-ink)}
  .dl .v a{color:#2A6F97;text-decoration:underline;word-break:break-all}
  .wa{display:inline-flex;vertical-align:middle;opacity:.9;line-height:0}
  .wa:hover{opacity:1}
  .wa svg{display:block}
  tr.you td{font-weight:600}
  tr.you td.n{box-shadow:inset 3px 0 var(--brass)}
  tr.you .youtag{font-family:"IBM Plex Mono",monospace;font-size:8.5px;font-weight:500;letter-spacing:.1em;
    text-transform:uppercase;color:var(--brass-deep);border:1px solid var(--warm-line);border-radius:4px;
    padding:0 4px;margin-left:6px;white-space:nowrap;vertical-align:middle}

  footer{margin-top:20px;display:flex;flex-wrap:wrap;justify-content:space-between;gap:12px;align-items:center;
    font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.05em;color:var(--faint)}
  .flinks{display:flex;gap:8px}
  #msg{padding:20px;color:var(--muted);font-size:13px}

  @media (prefers-color-scheme: dark){
    :root{ --paper:#0F1817; --ink:#E9EEEC; --muted:#A6B5B4; --faint:#869897;
      --line:#2C3938; --warm-line:#4A3D23; --brass:#D9A24C; --brass-deep:#E8C481; }
    .doc{border-color:#0a0f0e}   /* keep the light document distinct on the dark page */
  }
</style>
</head>
<body>
<div class="sheet">
  <a class="back" href="./index.html">← Schedule</a>
  <h1>Roster</h1>
  <div class="sub">AKM Chamber Music Festival · <span id="count">…</span></div>
  <div class="doc">
    <table>
      <colgroup><col class="c-n"><col class="c-nm"><col class="c-wa"><col class="c-in"><col class="c-ty"><col class="c-ht"></colgroup>
      <thead><tr><th class="n" data-k="n">#<span class="ar"></span></th><th data-k="name">Name<span class="ar"></span></th><th class="wa-h" id="wah" aria-label="WhatsApp"></th><th data-k="instrument">Instr.<span class="ar"></span></th><th data-k="type">Type<span class="ar"></span></th><th data-k="hotel">Hotel<span class="ar"></span></th></tr></thead>
      <tbody id="rows"></tbody>
    </table>
    <div id="msg" hidden></div>
  </div>
  <footer><span>where everyone is staying</span><span class="flinks"><a class="back" href="./network.html">Network</a><a class="back" id="editlink" target="_blank" rel="noopener">Edit sheet ↗</a><a class="back" href="./index.html">← Schedule</a></span></footer>
</div>
<script src="./roster-data.js"></script>
<script>
// The roster's fetch + parse + offline cache live in roster-data.js (shared with the schedule page,
// which primes the same akm-roster cache); this script just sorts + paints the table. Edit the sheet
// to update — nothing roster is in the repo (PII); the page re-pulls on open.
const DEFAULT_FILL = "#F2F4F6";
const HOTEL_COLORS = {
  "Lesachtalerhof":"#E7F0F7","Ferienwohnung Wilhelmer":"#EEEAF7","Musikhof Lexer":"#E3F2EC",
  "Haus Anita":"#F7F0DF","Gästehaus Ortner":"#F9E8DF","Haus Simona":"#DFF1F1",
  "Haus Salcher":"#F8F3D9","Haus Lanzinger":"#E8F2DF","Obermosterer AirBNB":"#F7E4E8",
  "Kultursaal Apartment":"#E1F1F6","Kleines Berghotel":"#ECEEF1","Obermosterer Apartment":"#EEE6F1",
};
const esc = s => (s||"").replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const linkify = s => esc(s).replace(/(https?:\/\/[^\s]+)/g, u => `<a href="${u}" target="_blank" rel="noopener">${u}</a>`);
const noteUrl = s => { const m=(s||"").match(/https?:\/\/[^\s]+/); return m ? m[0].replace(/[),.]+$/,"") : ""; };  // first URL in Notes → link the name
const $ = s => document.querySelector(s);

// hotels that exist on the offline map (by POI name) become "→ map" links; same source the map uses.
// stopPropagation so tapping the link opens the map instead of toggling the row's detail strip.
let PLACES = new Set();
async function loadPlaces(){
  try{ const d=await (await fetch("./map-data.json")).json();
    for(const p of d.pois) PLACES.add(p.name.toLowerCase());
  }catch{ /* offline + uncached: links just won't render until the map data is around */ }
}
const PIN = '<svg class="pin" viewBox="0 0 24 24" width="9" height="9" aria-hidden="true"><path fill="currentColor" d="M12 2C8.1 2 5 5.1 5 9c0 5 7 13 7 13s7-8 7-13c0-3.9-3.1-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6.5a2.5 2.5 0 0 1 0 5z"/></svg>';
// a few roster names don't match a map POI verbatim: both "Obermosterer …" entries are Haus
// Obernosterer (OCR drift, m→n), and the Kultursaal apartment sits at the Kultursaal venue.
const HOTEL_ALIAS = {
  "obermosterer airbnb":"Haus Obernosterer", "obermosterer apartment":"Haus Obernosterer",
  "kultursaal apartment":"Kultursaal",
};
const mapTarget = hotel => { const c = HOTEL_ALIAS[(hotel||"").toLowerCase()] || hotel;
  return PLACES.has((c||"").toLowerCase()) ? c : null; };
const mapLink = hotel => { const t = mapTarget(hotel);   // link to the canonical POI, keep the printed name
  return t ? `<a class="maplink" href="./map.html#${encodeURIComponent(t)}" onclick="event.stopPropagation()">${esc(hotel)}${PIN}</a>` : esc(hotel); };

// click the WhatsApp glyph → open a chat (app on phone) pre-filled with this greeting ({first} = first name)
const WA_MSG = "Hi {first}, it's Jason from AKM ";
const WA_SVG = '<svg viewBox="0 0 32 32" width="14" height="14" aria-hidden="true"><path fill="#25D366" d="M16 .6C7.5.6.6 7.5.6 16c0 2.8.8 5.5 2.1 7.8L.5 31.5l7.9-2.1c2.2 1.2 4.8 1.9 7.6 1.9 8.5 0 15.4-6.9 15.4-15.4S24.5.6 16 .6z"/><path fill="#fff" d="M23.1 19.3c-.4-.2-2.3-1.1-2.6-1.3-.3-.1-.6-.2-.8.2-.2.3-.9 1.2-1.2 1.5-.2.2-.4.2-.8.1-.4-.2-1.6-.6-3.1-1.9-1.1-1-1.9-2.3-2.1-2.7-.2-.4 0-.6.2-.8l.5-.6c.2-.2.2-.4.4-.6.1-.3 0-.5 0-.7-.1-.2-.8-2.1-1.2-2.8-.3-.7-.6-.6-.8-.6h-.7c-.2 0-.6.1-.9.4-.3.4-1.2 1.2-1.2 2.9s1.2 3.4 1.4 3.6c.2.2 2.5 3.8 6 5.3.8.4 1.5.6 2 .7.8.3 1.6.2 2.2.1.7-.1 2.3-.9 2.6-1.8.3-.9.3-1.7.2-1.8z"/></svg>';
function waLink(p){
  const num = (p.whatsapp||"").replace(/\D/g,"");
  if(!num) return "";
  const first = (p.name||"").split(/[\s,]/)[0];
  const msg = encodeURIComponent(WA_MSG.replace("{first}", first));
  return `<a class="wa" href="https://wa.me/${num}?text=${msg}" target="_blank" rel="noopener" title="WhatsApp ${esc(first)}" aria-label="Message ${esc(first)} on WhatsApp" onclick="event.stopPropagation()">${WA_SVG}</a>`;
}
let PEOPLE=[], sortKey=null, sortDir=1;     // null = sheet order (by number)
const TYPE_RANK={DIR:0,MGR:1,F:2,AF:3,TF:4,W1:5,W2:6,G:7};  // staff, faculty/fellows/weeks, then guests (G); blanks last
// instruments collapse to a fixed set, shown + sorted in this order; nothing else
const INST_ORDER=["V","V/VA","VA","VC","Bass","Piano","Clar."];
function instLabel(s){ s=(s||"").trim(); if(!s) return ""; const l=s.toLowerCase();
  return l==="v/va"?"V/VA" : l.startsWith("vc")?"VC" : l.startsWith("va")?"VA" : l.startsWith("v")?"V"
       : l.startsWith("b")?"Bass" : l.startsWith("p")?"Piano" : l.startsWith("c")?"Clar." : s; }
const instRank = s => { const k=instLabel(s), i=INST_ORDER.indexOf(k); return i>=0?i:(k?50:99); };
function key(p){
  if(sortKey==="n") return parseFloat(p.n)||0;
  if(sortKey==="type") return (p.type in TYPE_RANK) ? TYPE_RANK[p.type] : 8;
  return (p[sortKey]||"~").toLowerCase();    // blanks sort last
}
function cmp(a,b){
  const x = sortKey==="instrument" ? instRank(a.instrument) : key(a);
  const y = sortKey==="instrument" ? instRank(b.instrument) : key(b);
  return (x<y?-1:x>y?1:0)*sortDir;
}
function sortBy(k){ if(sortKey===k) sortDir=-sortDir; else { sortKey=k; sortDir=1; } paint(); }
function heads(){ document.querySelectorAll("thead th[data-k]").forEach(th=>{
  const on = th.dataset.k===sortKey;
  th.querySelector(".ar").textContent = on ? (sortDir>0?"▲":"▼") : "";
}); }
function render(people){ PEOPLE=people; paint(); }
function paint(){
  const tb=$("#rows"); tb.innerHTML="";
  $("#msg").hidden=true;
  heads();
  const people = sortKey ? [...PEOPLE].sort(cmp) : PEOPLE;
  for(const p of people){
    const fill = HOTEL_COLORS[p.hotel] || DEFAULT_FILL;
    const you = p.name==="Jason Sundram";
    const exp = !!(p.pieces || p.notes || p.from);             // expandable only if there's more to show
    const tr=document.createElement("tr");
    tr.style.background = fill;
    tr.className = (you?"you ":"") + (exp?"exp":"");
    const url = noteUrl(p.notes);
    const nm = url ? `<a class="nl" href="${esc(url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(p.name)}</a>` : esc(p.name);
    tr.innerHTML = `<td class="n">${esc(p.n)}</td>`+
      `<td>${nm}${you?'<span class="youtag">you</span>':''}</td>`+
      `<td class="wa-cell">${waLink(p)}</td>`+
      `<td class="in">${esc(instLabel(p.instrument))||"·"}</td>`+
      `<td class="ty">${esc(p.type)}</td>`+
      `<td class="ht">${mapLink(p.hotel)}${exp?'<span class="caret">›</span>':''}</td>`;
    tb.appendChild(tr);
    if(exp){
      const dr=document.createElement("tr");
      dr.className="detail"; dr.hidden=true; dr.style.background=fill;
      const dl=(k,v)=>v?`<div class="dl"><span class="k">${k}</span><span class="v">${linkify(v)}</span></div>`:"";
      dr.innerHTML=`<td colspan="6">${dl("From",p.from)}${dl("Pieces",p.pieces)}${dl("Notes",p.notes)}</td>`;
      tb.appendChild(dr);
      tr.addEventListener("click", ()=>{ const open=dr.hidden; dr.hidden=!open; tr.classList.toggle("open",open); });
    }
  }
  $("#count").textContent = `${people.length} participants`;
}
function msg(text){ $("#rows").innerHTML=""; $("#count").textContent=""; const m=$("#msg"); m.textContent=text; m.hidden=false; }

async function pull(){
  if(navigator.onLine===false) return;
  try{
    const people=await Roster.pull();
    if(people.length) render(people);
  }catch(e){ if(!Roster.cached()) msg("Roster unavailable — open once on wifi to cache it."); }
}
function boot(){
  $("#wah").innerHTML = WA_SVG;     // the WhatsApp column's header is the icon itself, no text
  document.querySelectorAll("thead th[data-k]").forEach(th=>th.onclick=()=>sortBy(th.dataset.k));
  editlink.href = `https://docs.google.com/spreadsheets/d/${Roster.SID}/edit?gid=${Roster.GID}#gid=${Roster.GID}`;
  const cached = Roster.cached();
  if(cached) render(cached);
  else if(navigator.onLine) msg("Loading roster…");
  else msg("Offline — open once on wifi to load the roster.");
  loadPlaces().then(()=>{ if(PEOPLE.length) paint(); });   // re-paint once we know which hotels map
  pull();
  addEventListener("visibilitychange", ()=>{ if(!document.hidden) pull(); });   // re-pull when reopened
}
boot();
</script>
</body>
</html>
