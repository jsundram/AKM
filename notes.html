<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#E9EDEC" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0F1817" media="(prefers-color-scheme: dark)">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&amp;family=IBM+Plex+Mono:wght@400;500&amp;family=Inter:wght@400;500;600&amp;display=swap">
<link rel="stylesheet" href="./nav.css">
<link rel="icon" type="image/svg+xml" href="./icon.svg">
<link rel="apple-touch-icon" href="./icon-180.png">
<title>AKM — Grace Notes</title>
<meta name="description" content="A small daily coda.">
<meta property="og:site_name" content="AKM">
<meta property="og:type" content="website">
<meta property="og:title" content="AKM — Grace Notes">
<meta property="og:description" content="A small daily coda.">
<meta property="og:url" content="https://jsundram.github.io/AKM/notes.html">
<meta property="og:image" content="https://jsundram.github.io/AKM/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="Dawn over an alpine valley — snow-capped peak, meadows, and the AKM wordmark">
<meta name="twitter:card" content="summary_large_image">
<style>
  :root{
    --paper:#E9EDEC; --haze:#DEE5E3; --ink:#172526; --muted:#5F7072; --faint:#8C9A9B;
    --line:#CBD3D1; --warm:#F3ECDD; --warm-line:#E2D2B2; --brass:#9A6B22; --brass-deep:#7C5417;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
  /* offset anchor jumps so a section heading clears the header when linked to */
  section{scroll-margin-top:16px}
  body{background:var(--paper);color:var(--ink);font-family:"Inter",system-ui,sans-serif;line-height:1.45;
    display:flex;justify-content:center;
    padding:calc(20px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right))
            calc(44px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left))}
  .sheet{width:100%;max-width:640px}

  h1{font-family:"Fraunces",serif;font-weight:500;font-size:30px;letter-spacing:-.015em;margin:16px 0 3px}
  .lede{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:18px;max-width:52ch}

  /* jump index — composer chips that scroll to each section */
  .index{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px}
  .index a{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.02em;
    color:var(--muted);text-decoration:none;border:1px solid var(--line);border-radius:7px;padding:4px 10px}
  .index a:hover{color:var(--brass-deep);border-color:var(--warm-line)}
  .index a .ct{color:var(--faint);margin-left:5px}

  section{margin-top:34px;padding-top:18px;border-top:1px solid var(--line)}
  .cname{font-family:"Fraunces",serif;font-weight:500;font-size:23px;letter-spacing:-.01em;color:var(--ink)}
  .cnote{display:block;font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.02em;
    color:var(--faint);margin-top:5px;line-height:1.4}

  .quotes{margin-top:18px;display:grid;gap:22px}
  .quote{font-family:"Fraunces",serif;font-style:italic;font-weight:400;font-size:19px;
    line-height:1.34;color:var(--ink);letter-spacing:-.005em}
  .quote .prov{display:block;font-family:"IBM Plex Mono",monospace;font-style:normal;font-size:10px;
    letter-spacing:.02em;color:var(--faint);margin-top:7px;line-height:1.4}
  .quote .tier{display:inline-block;font-family:"IBM Plex Mono",monospace;font-style:normal;font-size:8.5px;
    letter-spacing:.08em;text-transform:uppercase;color:var(--brass-deep);background:var(--warm);
    border:1px solid var(--warm-line);border-radius:4px;padding:1px 5px;margin-top:7px}
  .quote .aside{display:block;font-family:"Inter",sans-serif;font-style:normal;font-size:11.5px;
    color:var(--faint);margin-top:7px;line-height:1.45}

  .facts-wrap{margin-top:24px}
  .sub-lab{font-family:"IBM Plex Mono",monospace;font-size:9.5px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--brass);margin-bottom:12px}
  .facts{display:grid;gap:11px}
  .fact{display:flex;gap:9px;font-size:12.5px;color:var(--muted);line-height:1.5}
  .fact b{color:var(--ink);font-weight:500}
  .fact .fsrc{display:block;font-family:"IBM Plex Mono",monospace;font-size:9.5px;letter-spacing:.02em;
    color:var(--faint);margin-top:3px}

  #msg{padding:24px 0;color:var(--muted);font-size:13px}

  @media (prefers-color-scheme: dark){
    :root{ --paper:#0F1817; --haze:#172221; --ink:#E9EEEC; --muted:#A6B5B4; --faint:#869897;
      --line:#2C3938; --warm:#272015; --warm-line:#4A3D23; --brass:#D9A24C; --brass-deep:#E8C481; }
    .quote .tier{background:#2E2616}
  }
</style>
</head>
<body>
<div class="sheet">
  <header class="apphead">
    <a class="wordmark" href="https://alpenkammermusik.com" target="_blank" rel="noopener" aria-label="AlpenKammerMusik"><span class="full">AlpenKammerMusik</span><span class="abbr">AKM</span></a>
    <nav><a href="./index.html">Today</a><a href="./map.html">Map</a><a href="./roster.html">Roster</a><a href="./network.html">Network</a></nav>
  </header>
  <h1>Grace notes</h1>
  <p class="lede">Every grace note from the daily briefing, grouped by composer — the quotes that surface one at a time under the schedule, gathered here to read in a row.</p>
  <nav class="index" id="index" aria-label="Jump to composer"></nav>
  <div id="notes"></div>
  <div id="msg" hidden></div>
</div>
<script>
// Reads composer-bank.json (the same vetted pool the schedule's coda draws from — in the repo and
// SW-precached, so this page renders offline). Groups every quote + fact by composer, one section
// each with an #anchor so the coda's composer name can deep-link straight to its wall of quotes.
const esc = s => (s||"").replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const linkify = s => esc(s).replace(/(https?:\/\/[^\s]+)/g, u => `<a href="${u}" target="_blank" rel="noopener">${u.replace(/[),.]+$/,"")}</a>`);
const $ = s => document.querySelector(s);
// sourced quotes print bare; anything softer wears its tier so nothing reads more certain than it is
const TIER_LABEL = {attributed:"attributed", standard:"unverified"};

function sectionHTML(key, c){
  const quotes = (c.quotes||[]).map(q => {
    const tier = TIER_LABEL[q.tier] ? `<span class="tier">${TIER_LABEL[q.tier]}</span>` : "";
    const aside = q.note ? `<span class="aside">${esc(q.note)}</span>` : "";
    return `<blockquote class="quote">${esc(q.text)}<span class="prov">${esc(q.src)}</span>${tier}${aside}</blockquote>`;
  }).join("");
  const facts = (c.facts||[]).map(f =>
    `<div class="fact"><span>${esc(f.text)}<span class="fsrc">${esc(f.src)}</span></span></div>`).join("");
  return `<section id="${key}">`
    + `<div class="cname">${esc(c.name)}</div>`
    + (c._note ? `<span class="cnote">${esc(c._note)}</span>` : "")
    + (quotes ? `<div class="quotes">${quotes}</div>` : "")
    + (facts ? `<div class="facts-wrap"><div class="sub-lab">Facts</div><div class="facts">${facts}</div></div>` : "")
    + `</section>`;
}

function render(bank){
  const keys = Object.keys(bank).filter(k => k[0] !== "_" && bank[k].name);
  if(!keys.length) return msg("No grace notes found.");
  $("#index").innerHTML = keys.map(k => {
    const n = (bank[k].quotes||[]).length;
    return `<a href="#${k}">${esc(bank[k].name)}<span class="ct">${n}</span></a>`;
  }).join("");
  $("#notes").innerHTML = keys.map(k => sectionHTML(k, bank[k])).join("");
  // land on the right section when arrived via #anchor (smooth-scroll after paint)
  if(location.hash){ const el = document.getElementById(location.hash.slice(1)); if(el) el.scrollIntoView(); }
}
function msg(text){ const m=$("#msg"); m.textContent=text; m.hidden=false; }

(async () => {
  try{ render(await (await fetch("./composer-bank.json")).json()); }
  catch{ msg("Grace notes unavailable — open once online to cache them."); }
})();
</script>
<script src="./ping.js"></script>
</body>
</html>
