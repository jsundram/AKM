<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="color-scheme" content="light dark">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&amp;family=IBM+Plex+Mono:wght@400;500&amp;family=Inter:wght@400;500&amp;display=swap">
<link rel="stylesheet" href="./nav.css">
<meta name="theme-color" content="#E9EDEC" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0F1817" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="AKM">
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/svg+xml" href="./icon.svg">
<link rel="icon" type="image/png" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-180.png">
<title>AKM — today</title>
<meta name="description" content="Your day at the festival: rehearsals with room and coach, the valley's hourly weather, and the whole week cached for offline.">
<meta property="og:site_name" content="AKM">
<meta property="og:type" content="website">
<meta property="og:title" content="AKM — Today">
<meta property="og:description" content="Your day at the festival: rehearsals with room and coach, the valley's hourly weather, and the whole week cached for offline.">
<meta property="og:url" content="https://jsundram.github.io/AKM/">
<meta property="og:image" content="https://jsundram.github.io/AKM/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:alt" content="Dawn over an alpine valley — snow-capped peak, meadows, and the AKM wordmark">
<meta name="twitter:card" content="summary_large_image">
<style>
  :root{
    --paper:#E9EDEC; --haze:#DFE5E3; --ink:#172526; --muted:#5F7072; --faint:#8C9A9B;
    --line:#CBD3D1; --warm:#F4ECDD; --warm-line:#E2D2B2; --brass:#9A6B22; --brass-deep:#7C5417;
    --sky:#84A8BE; --shower:#6E7D84;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--paper);color:var(--ink);font-family:"Inter",system-ui,sans-serif;
    line-height:1.4;display:flex;justify-content:center;overscroll-behavior-y:none;
    padding:calc(28px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right))
            calc(48px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left))}
  .sheet{width:100%;max-width:452px}

  .eyebrow{font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between;align-items:baseline}
  .eyebrow b{color:var(--brass);font-weight:500}
  .date{font-family:"Fraunces",serif;font-weight:500;font-size:40px;line-height:1.0;
    letter-spacing:-.015em;margin:10px 0 2px}
  .date .dow{display:block;font-size:15px;font-weight:500;letter-spacing:.04em;
    text-transform:uppercase;color:var(--muted);margin-bottom:4px}

  .wx{margin:20px 0 26px;border:1px solid var(--line);border-radius:13px;
    background:linear-gradient(180deg,#F2F5F4,#E7ECEA);overflow:hidden}
  .wx-top{display:flex;align-items:center;gap:14px;padding:13px 16px 11px}
  .wx-temp{font-family:"Fraunces",serif;font-size:30px;font-weight:500;letter-spacing:-.02em;
    background:none;border:0;padding:0;color:inherit;cursor:pointer;text-align:left;line-height:1}
  .wx-temp small{font-size:15px;color:var(--muted);font-weight:400}
  .wx-temp small u{text-decoration-color:var(--line);text-underline-offset:2px}
  .wx-sum{font-size:12.5px;color:var(--muted);line-height:1.35}
  .wx-sum b{color:var(--ink);font-weight:500}
  .wx-arc{display:flex;border-top:1px solid var(--line);
    font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.04em}
  .wx-arc div{flex:1;padding:7px 10px;color:var(--muted);text-align:center;border-left:1px solid var(--line)}
  .wx-arc div:first-child{border-left:none}
  .wx-arc div span{display:block;color:var(--ink);margin-top:2px;font-size:11px}
  .wx-arc .rain span{color:var(--shower)}
  .wx-arc .mm{display:block;font-family:"IBM Plex Mono",monospace;font-size:9.5px;color:var(--faint);margin-top:3px;letter-spacing:.02em}
  .wx-arc .rain .mm{color:var(--shower)}
  .wx-arc .storm{display:inline-block;font-family:"IBM Plex Mono",monospace;font-size:8px;letter-spacing:.1em;
    text-transform:uppercase;color:#fff;background:var(--shower);border-radius:3px;padding:1px 4px;margin-top:4px}
  .wx-bar{height:3px;background:linear-gradient(90deg,var(--sky) 0%,var(--sky) 32%,var(--shower) 44%,var(--shower) 70%,var(--sky) 90%)}
  .wx-curve{padding:6px 12px 2px}
  .wx-src{padding:5px 14px 9px;font-family:"IBM Plex Mono",monospace;font-size:9px;
    letter-spacing:.03em;color:var(--faint);text-align:right}
  .wx-foot{display:flex;justify-content:space-between;padding:7px 14px;border-top:1px solid var(--line);
    font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.04em;color:var(--muted)}
  .wx-foot b{color:var(--ink);font-weight:500}

  .tl-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;
    margin:0 0 16px;padding-top:16px;border-top:1px solid var(--line)}
  .tl-title{font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.22em;
    text-transform:uppercase;color:var(--muted)}
  .tl-meta{display:flex;align-items:center;gap:6px;font-family:"IBM Plex Mono",monospace;
    font-size:10px;letter-spacing:.04em;color:var(--faint);white-space:nowrap}
  .tl-meta a{color:var(--muted);text-decoration:underline;text-underline-offset:2px;text-decoration-color:var(--line)}
  .tl-empty{font-size:13px;color:var(--muted);line-height:1.4;padding:2px 0 4px}
  .tl-empty b{color:var(--ink);font-weight:500}
  .tl{position:relative}
  .row{display:grid;grid-template-columns:54px 1fr;gap:16px;padding:0 0 4px;position:relative}
  .row::before{content:"";position:absolute;left:62px;top:7px;bottom:-4px;width:1px;background:var(--line)}
  .row:last-child::before{display:none}
  .time{font-family:"IBM Plex Mono",monospace;text-align:right;padding-top:1px;padding-right:6px}
  .time .s{font-size:13px;color:var(--ink);font-weight:500;display:block}
  .time .e{font-size:11px;color:var(--faint);display:block;margin-top:1px}
  .body{padding-bottom:18px;position:relative}
  .dot{position:absolute;left:-12px;top:5px;width:9px;height:9px;border-radius:50%;
    background:var(--paper);border:1.5px solid var(--faint)}

  .ev .what{font-size:13.5px;font-weight:500;color:var(--ink)}
  .ev .where{font-size:12px;color:var(--muted);margin-top:1px}
  .ev .where .note{color:var(--brass-deep)}
  .tag{font-family:"IBM Plex Mono",monospace;font-size:9.5px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--faint);margin-bottom:2px}

  .meal .what{color:var(--muted);font-weight:400;font-size:12.5px}
  .meal .dot{width:6px;height:6px;left:-11px;top:7px;border-color:var(--line);background:var(--haze)}

  .mine .dot{background:var(--brass);border-color:var(--brass);left:-13px;width:11px;height:11px;
    box-shadow:0 0 0 3px var(--paper)}
  .card{background:var(--warm);border:1px solid var(--warm-line);border-radius:12px;padding:11px 13px;margin-top:-2px}
  .card .kicker{font-family:"IBM Plex Mono",monospace;font-size:9.5px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--brass-deep);display:flex;justify-content:space-between}
  .card .kicker .pc{color:var(--brass)}
  .piece{font-family:"Fraunces",serif;font-size:18.5px;font-weight:500;line-height:1.15;margin:5px 0 6px;letter-spacing:-.01em}
  .meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
  .roomchip{font-family:"IBM Plex Mono",monospace;font-size:11px;font-weight:500;color:var(--brass-deep);
    background:#EFE2C8;border:1px solid var(--warm-line);border-radius:5px;padding:1px 6px;letter-spacing:.02em}
  .meta .coach b{color:var(--ink);font-weight:500}
  .meta .coach a{color:inherit;text-decoration:underline;text-decoration-thickness:.7px;text-underline-offset:2px;text-decoration-color:var(--muted)}
  /* a place that's on the offline map → tap to open it there */
  a.maplink{text-decoration:none;cursor:pointer}
  a.roomchip,a.rm{display:inline-flex;align-items:center;gap:3px}
  .maplink .pin{flex:none;opacity:.65;margin-top:-1px}
  a.roomchip:hover{background:#E7D6B0;border-color:var(--brass)}
  a.rm:hover{border-color:var(--muted)}
  .what a.maplink{color:inherit;border-bottom:1px dotted currentColor}
  .what a.maplink .pin{vertical-align:baseline}
  /* the concert's printed program (a PDF) — muted ink, same voice as the coach bio links */
  .what a.prog{color:var(--muted);font-weight:400;white-space:nowrap;text-decoration:underline;
    text-decoration-thickness:.7px;text-underline-offset:2px;text-decoration-color:var(--muted)}

  .wxnote{grid-column:2;margin:-10px 0 16px;display:flex;align-items:center;gap:7px;
    font-size:11.5px;color:var(--shower)}
  .wxnote::before{content:"";width:14px;height:1px;background:var(--shower);opacity:.5}

  /* an unscheduled rehearsal block — explicitly free time, deliberately NOT brass (nothing to
     play); dashed like a self-added card, tap to turn it into one */
  .free .dot{border-style:dashed}
  .freecard{background:transparent;border:1.5px dashed var(--line);cursor:pointer}
  .freecard .kicker,.freecard .kicker .pc{color:var(--faint)}
  .freecard .piece{color:var(--muted);font-size:16.5px}
  .freecard:hover{border-color:var(--muted)}
  .roomnote{margin-top:9px;font-size:11.5px;color:var(--muted);line-height:1.4}
  .roomnote b{color:var(--ink);font-weight:500}

  /* coda — the grace note */
  .coda{margin-top:28px;padding-top:18px;border-top:1px solid var(--line)}
  .coda-lab{display:block;font-family:"IBM Plex Mono",monospace;font-size:9.5px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--brass);margin-bottom:11px;text-decoration:none;width:fit-content}
  a.coda-lab:hover{color:var(--brass-deep)}
  .quote{font-family:"Fraunces",serif;font-style:italic;font-weight:400;font-size:20px;
    line-height:1.32;color:var(--ink);letter-spacing:-.005em}
  .quote .by{display:block;font-family:"Inter",sans-serif;font-style:normal;font-size:12px;
    color:var(--muted);margin-top:8px;width:fit-content}
  a.by{text-decoration:underline;text-decoration-color:var(--line);text-underline-offset:2px}
  a.by:hover{color:var(--ink)}
  .quote .by::before{content:"— "}
  .quote .prov{display:block;font-family:"IBM Plex Mono",monospace;font-style:normal;font-size:10px;
    letter-spacing:.02em;color:var(--faint);margin-top:6px;line-height:1.4}
  .quote .prov i{font-style:italic}
  .aside{font-size:11.5px;color:var(--faint);margin-top:8px;line-height:1.4}
  .facts{margin-top:16px;display:grid;gap:10px}
  .fact{display:flex;gap:9px;font-size:12px;color:var(--muted);line-height:1.45}
  .fact .ftag{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.08em;
    color:var(--brass-deep);background:#EFE2C8;border:1px solid var(--warm-line);border-radius:4px;
    padding:2px 6px;height:fit-content;flex:none;white-space:nowrap;text-decoration:none}
  a.ftag:hover{border-color:var(--brass)}
  .fact b{color:var(--ink);font-weight:500}
  .fact .fsrc{font-family:"IBM Plex Mono",monospace;font-size:9.5px;letter-spacing:.02em;color:var(--faint);white-space:nowrap}


  @media (prefers-reduced-motion:no-preference){
    .row,.wx,.masthead,.tl-head{animation:rise .5s cubic-bezier(.2,.7,.3,1) both}
    .wx{animation-delay:.05s}
    .tl .row:nth-child(1){animation-delay:.10s}
    .tl .row:nth-child(2){animation-delay:.15s}
    .tl .row:nth-child(3){animation-delay:.20s}
    .tl .row:nth-child(4){animation-delay:.25s}
    .tl .row:nth-child(5){animation-delay:.30s}
    .tl .row:nth-child(6){animation-delay:.35s}
    .tl .row:nth-child(7){animation-delay:.40s}
    @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  }
  @media (prefers-color-scheme: dark){
    :root{
      --paper:#0F1817; --haze:#172221; --ink:#E9EEEC; --muted:#A6B5B4; --faint:#869897;
      --line:#2C3938; --warm:#272015; --warm-line:#4A3D23;
      --brass:#D9A24C; --brass-deep:#E8C481; --sky:#7FB2CE; --shower:#9AA7AB;
    }
    .wx{background:linear-gradient(180deg,#172221,#0F1817)}
    .roomchip,.fact .ftag{background:#2E2616}
    a.roomchip:hover{background:#3A2F19;border-color:var(--brass)}
    .wx-arc .storm{background:#566267;color:#E9EEEC}
  }

  /* --- app chrome (pull/offline PWA) --- */
  .bar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 0 14px;flex-wrap:wrap}
  .days{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;flex:1;min-width:0}
  .days::-webkit-scrollbar{display:none}
  .chip{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.02em;color:var(--muted);
    border:1px solid var(--line);border-radius:6px;padding:3px 8px;white-space:nowrap;cursor:pointer;background:none}
  .chip.on{color:var(--brass-deep);border-color:var(--warm-line);background:#EFE2C8}
  .chip.empty{opacity:.45}
  .netdot{width:7px;height:7px;border-radius:50%;background:#6E9A6B;flex:none}
  .netdot.off{background:#B07A3A}
  .stale{color:#B07A3A}
  #app:empty::after{content:"Loading today…";display:block;color:var(--faint);font-size:13px;padding:24px 2px}
  #ptr{position:fixed;top:env(safe-area-inset-top);left:0;right:0;height:0;overflow:hidden;z-index:20;
    pointer-events:none;display:flex;align-items:flex-end;justify-content:center;padding-bottom:9px;
    font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--faint);background:linear-gradient(180deg,var(--paper) 55%,transparent)}
  #ptr.snap{transition:height .25s ease}

  @media (prefers-color-scheme: dark){ .chip.on{background:#2E2616} }

  /* --- personal (self-added) events --- */
  .addbtn{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.06em;color:var(--muted);
    background:none;border:1px solid var(--line);border-radius:5px;padding:2px 7px;cursor:pointer}
  .addbtn:hover{border-color:var(--muted);color:var(--ink)}
  /* your own added event — brass like a rehearsal (it's still "just for me"), but a dashed edge marks
     it self-added rather than from the official sheet. tap the card to edit; the × removes it. */
  .self .card{border-style:dashed;cursor:pointer}
  .self .kicker .selfx{font-family:"Inter",sans-serif;font-size:16px;line-height:1;color:var(--brass);
    background:none;border:none;cursor:pointer;padding:0 0 0 8px;margin:-2px 0}
  .self .kicker .selfx:hover{color:var(--shower)}
  .self .meta .with b{color:var(--ink);font-weight:500}

  /* --- add sheet (overlay) --- */
  #addsheet[hidden]{display:none}
  #addsheet{position:fixed;inset:0;z-index:40;display:flex;align-items:flex-end;justify-content:center}
  .add-scrim{position:absolute;inset:0;background:rgba(15,24,23,.42);-webkit-backdrop-filter:blur(1.5px);backdrop-filter:blur(1.5px)}
  .add-card{position:relative;width:100%;max-width:452px;background:var(--paper);border:1px solid var(--line);
    border-radius:16px 16px 0 0;padding:18px 18px calc(18px + env(safe-area-inset-bottom));
    display:flex;flex-direction:column;gap:12px;box-shadow:0 -8px 30px rgba(0,0,0,.18)}
  @media (prefers-reduced-motion:no-preference){
    .add-card{animation:sheetup .28s cubic-bezier(.2,.7,.3,1) both}
    @keyframes sheetup{from{transform:translateY(16px);opacity:.5}to{transform:none;opacity:1}}
  }
  .add-head{display:flex;justify-content:space-between;align-items:center;font-family:"IBM Plex Mono",monospace;
    font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .add-head b{color:var(--ink);font-weight:500}
  .addx{font-size:22px;line-height:1;color:var(--faint);background:none;border:none;cursor:pointer;padding:0 2px}
  .add-slots{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;align-items:center}
  .add-slots:empty{display:none}
  .add-slots::-webkit-scrollbar{display:none}
  .add-slots .slotlab{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--faint);flex:none;padding-right:2px}
  .slotchip{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--muted);border:1px solid var(--line);
    border-radius:6px;padding:3px 8px;background:none;cursor:pointer;white-space:nowrap;flex:none}
  .slotchip:hover{border-color:var(--muted);color:var(--ink)}
  .add-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .add-f{display:flex;flex-direction:column;gap:4px;font-family:"IBM Plex Mono",monospace;
    font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
  .add-f input,.add-f select{font-family:"Inter",sans-serif;font-size:16px;color:var(--ink);background:var(--haze);
    border:1px solid var(--line);border-radius:8px;padding:9px 11px;letter-spacing:normal;text-transform:none;width:100%;-webkit-appearance:none;appearance:none}
  .add-f input:focus,.add-f select:focus{outline:none;border-color:var(--muted)}
  /* WITH field: roster autocomplete as removable chips (multiple players) */
  .chipbox{position:relative;display:flex;flex-wrap:wrap;gap:5px;align-items:center;background:var(--haze);
    border:1px solid var(--line);border-radius:8px;padding:6px 8px;letter-spacing:normal;text-transform:none}
  .chipbox:focus-within{border-color:var(--muted)}
  .chipbox input{background:none;border:none;border-radius:0;padding:3px 2px;width:auto;flex:1;min-width:88px}
  .wchip{display:inline-flex;align-items:center;gap:5px;font-family:"Inter",sans-serif;font-size:13px;
    color:var(--ink);background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:3px 4px 3px 9px}
  .wchip button{font:inherit;font-size:15px;line-height:1;color:var(--faint);background:none;border:none;cursor:pointer;padding:0 2px}
  .wchip button:hover{color:var(--ink)}
  .wac{position:absolute;left:0;right:0;top:calc(100% + 4px);z-index:5;background:var(--paper);
    border:1px solid var(--line);border-radius:8px;overflow:hidden;box-shadow:0 8px 22px rgba(0,0,0,.16)}
  .wac[hidden]{display:none}
  .wac button{display:block;width:100%;text-align:left;font-family:"Inter",sans-serif;font-size:14px;color:var(--ink);
    background:none;border:none;border-top:1px solid var(--line);padding:9px 11px;cursor:pointer;letter-spacing:normal;text-transform:none}
  .wac button:first-child{border-top:none}
  .wac button:hover,.wac button.on{background:var(--haze)}
  /* --- identity picker (same sheet chrome as #addsheet) --- */
  #whosheet[hidden]{display:none}
  #whosheet{position:fixed;inset:0;z-index:40;display:flex;align-items:flex-end;justify-content:center}
  .who-sub{font-size:12.5px;color:var(--muted);line-height:1.45}
  .who-list{display:flex;flex-direction:column;overflow-y:auto;max-height:52vh;
    border:1px solid var(--line);border-radius:10px;-webkit-overflow-scrolling:touch}
  .who{display:flex;justify-content:space-between;align-items:baseline;gap:10px;text-align:left;
    font-family:"Inter",sans-serif;font-size:14.5px;color:var(--ink);background:none;border:none;
    border-bottom:1px solid var(--line);padding:10px 13px;cursor:pointer}
  .who:last-child{border-bottom:none}
  .who span{font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--faint);letter-spacing:.02em}
  .who:hover{background:var(--haze)}
  .who.on{color:var(--brass-deep);font-weight:500;box-shadow:inset 3px 0 var(--brass)}
  .who-foot{margin-top:26px;padding-top:12px;border-top:1px solid var(--line);
    font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.06em;color:var(--faint)}
  .who-foot b{color:var(--brass);font-weight:500}
  .who-foot button{font:inherit;color:var(--muted);background:none;border:none;cursor:pointer;
    padding:0;text-decoration:underline;text-underline-offset:2px;text-decoration-color:var(--line)}
  .who-foot button:hover{color:var(--ink)}

  .add-actions{display:flex;gap:10px;margin-top:2px}
  .btn-ghost{flex:none;font-family:"Inter",sans-serif;font-size:14px;color:var(--muted);background:none;
    border:1px solid var(--line);border-radius:9px;padding:10px 16px;cursor:pointer}
  .btn-go{flex:1;font-family:"Inter",sans-serif;font-size:14px;font-weight:500;color:var(--paper);
    background:var(--ink);border:1px solid var(--ink);border-radius:9px;padding:10px 16px;cursor:pointer}
  .btn-go:active{opacity:.85}
</style>
</head>

<div id="ptr"></div>
<div class="sheet">

    <nav><span aria-current="page">Today</span><a href="./map.html">Map</a><a href="./roster.html">Roster</a><a href="./network.html">Network</a></nav>
