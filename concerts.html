<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#E9EDEC" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0F1817" media="(prefers-color-scheme: dark)">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&amp;family=IBM+Plex+Mono:wght@400;500&amp;family=Inter:wght@400;500;600&amp;display=swap">

<link rel="icon" type="image/svg+xml" href="./icon.svg">
<link rel="apple-touch-icon" href="./icon-180.png">
<title>AKM — Concerts</title>
<meta name="description" content="The festival's concert programs in brief.">
<meta property="og:site_name" content="AKM">
<meta property="og:type" content="website">
<meta property="og:title" content="AKM — Concerts">
<meta property="og:description" content="The festival's concert programs in brief.">
<meta property="og:url" content="https://jsundram.github.io/AKM/concerts.html">
<meta property="og:image" content="https://jsundram.github.io/AKM/og.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<style>
  :root{
    --paper:#E9EDEC; --haze:#DEE5E3; --ink:#172526; --muted:#5F7072; --faint:#8C9A9B;
    --line:#CBD3D1; --warm:#F3ECDD; --warm-line:#E2D2B2; --brass:#9A6B22; --brass-deep:#7C5417;
    --draft:#A14434;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
  section{scroll-margin-top:16px}
  body{background:var(--paper);color:var(--ink);font-family:"Inter",system-ui,sans-serif;line-height:1.45;
    display:flex;justify-content:center;
    padding:calc(20px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right))
            calc(44px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left))}
  .sheet{width:100%;max-width:640px}

  h1{font-family:"Fraunces",serif;font-weight:500;font-size:30px;letter-spacing:-.015em;margin:16px 0 3px}
  .lede{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:18px;max-width:52ch}

  /* jump index — one chip per concert */
  .index{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px}
  .index a{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.02em;
    color:var(--muted);text-decoration:none;border:1px solid var(--line);border-radius:7px;padding:4px 10px}
  .index a:hover{color:var(--brass-deep);border-color:var(--warm-line)}

  section{margin-top:34px;padding-top:18px;border-top:1px solid var(--line)}
  h2{font-family:"Fraunces",serif;font-weight:500;font-size:23px;letter-spacing:-.01em}
  .cmeta{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.02em;color:var(--muted);
    margin-top:5px;line-height:1.7}
  .cmeta a{color:inherit;text-decoration:underline;text-decoration-thickness:.7px;
    text-underline-offset:2px;text-decoration-color:var(--muted)}
  .cmeta .dr{color:var(--draft);font-weight:600;font-size:10px;letter-spacing:.06em}

  ol.pieces{margin:16px 0 0;padding-left:22px;display:grid;gap:16px}
  ol.pieces li::marker{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--faint)}
  li.brk{list-style:none;font-family:"IBM Plex Mono",monospace;font-size:9.5px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--faint);text-align:center;margin-left:-22px;padding:2px 0}
  .pt{font-size:13.5px;font-weight:500}
  .pt b{font-weight:600}
  .mv{font-size:12px;color:var(--muted);margin-top:1px;font-style:italic}
  .names{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px}
  /* name chips share a shape: an unmatched name (guest choir, flugelhorn trio) is a plain .p; a
     matched player is a .duo link — their name welded to a warm 👏 clap button — so the chip reads
     as applause, not a contact card. The whole chip is the link; the clap just marks the action. */
  .names .p,.names .who{display:inline-flex;align-items:center;gap:5px;font-family:"IBM Plex Mono",monospace;
    font-size:11px;letter-spacing:.02em;border:1px solid var(--line);padding:3px 9px}
  .names .p .inst,.names .who .inst{color:var(--faint);font-size:9.5px}
  .names .p{color:var(--muted);border-radius:7px}
  .names .duo{display:inline-flex;align-items:stretch;text-decoration:none}
  .names .who{color:var(--ink);border-right:none;border-radius:7px 0 0 7px}
  .names .kudos{display:inline-flex;align-items:center;font-size:15px;line-height:1;
    background:var(--warm);border:1px solid var(--warm-line);border-radius:0 7px 7px 0;padding:2px 10px;
    transition:background .16s ease}
  .names .duo:hover .kudos{background:var(--brass)}
  .names .duo:hover .clap{animation:wiggle .5s ease}
  @keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-14deg)}60%{transform:rotate(12deg)}}
  @media (prefers-reduced-motion:reduce){
    .names .kudos{transition:none} .names .duo:hover .clap{animation:none} }

  #msg{padding:18px 0 0;color:var(--faint);font-size:12px}

  @media (prefers-color-scheme: dark){
    :root{ --paper:#0F1817; --haze:#172221; --ink:#E9EEEC; --muted:#A6B5B4; --faint:#869897;
      --line:#2C3938; --warm:#272015; --warm-line:#4A3D23; --brass:#D9A24C; --brass-deep:#E8C481;
      --draft:#E39181; }
  }
</style>
</head>
<body>
<div class="sheet">
  <header class="apphead">
    <a class="wordmark" href="./about.html" aria-label="About AKM"><span class="full">AlpenKammerMusik</span><span class="abbr">AKM</span></a>
    <nav><a href="./index.html">Today</a><a href="./map.html">Map</a><a href="./roster.html">Roster</a><a href="./network.html">Network</a><span aria-current="page">Concerts</span></nav>
  </header>
  <h1>Concerts</h1>
  <p class="lede">Each festival concert in brief, with the printed program linked. Tap the 👏 by a player's name to send them a quick kudos on WhatsApp.</p>
  <nav class="index" id="index" aria-label="Jump to concert"></nav>
  <div id="concerts"></div>
  <div id="msg" hidden></div>
</div>
<script src="./roster-data.js"></script>
<script src="./concert-data.js"></script>
<script>
// Program data lives in concert-data.js (window.Concerts) — shared with the schedule page,
// which renders each concert as a card and needs the same performer lists. Edit it there.
const CONCERTS = Concerts.all;

const $ = s => document.querySelector(s);
const esc = s => (s||"").replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

// programmed name → roster person via the shared matcher (concert-data.js) — the same rules the
// schedule's "you're performing" card uses, so the two pages can't drift. A matched player becomes a
// .duo link — their name welded to a warm 👏 clap button — that opens WhatsApp pre-filled with a
// kudos naming the piece's composer ("…I loved your Brahms 👏👏👏 — <me>"); the whole chip is the
// link (forgiving tap target). Unmatched names (the guest choir, the flugelhorn trio) print as a
// plain chip, unlinked.
function nameChip(find, [name, inst], composer){
  const p = find(name, inst), first = name.split(/\s+/)[0];
  const tail = (inst ? `<span class="inst">${esc(inst)}</span>` : "");
  const num = p && (p.whatsapp||"").replace(/\D/g,"");
  if(!num) return `<span class="p">${esc(p ? first : name)}${tail}</span>`;
  const me = (window.Roster && Roster.me() || "").split(/\s+/)[0];
  const loved = composer ? ` I loved your ${composer}` : "";
  const msg = encodeURIComponent(`Kudos on an amazing performance!${loved} 👏👏👏${me?` — ${me}`:""}`);
  return `<a class="duo" href="https://wa.me/${num}?text=${msg}" target="_blank" rel="noopener" data-to="${esc(p.name)}" data-piece="${esc(composer||"")}" `
    + `title="Send kudos to ${esc(p.name)} on WhatsApp" aria-label="Send kudos to ${esc(p.name)} on WhatsApp">`
    + `<span class="who">${esc(first)}${tail}</span>`
    + `<span class="kudos"><span class="clap" aria-hidden="true">👏</span></span></a>`;
}

function render(people){
  const find = Concerts.matcher(people);
  $("#index").innerHTML = CONCERTS.map(c =>
    `<a href="#${c.id}">${esc(c.day.slice(0,3))} ${c.day.replace(/\D+/g,"")} · ${esc(c.time.replace(":00","").replace(" ",""))}</a>`).join("");
  $("#concerts").innerHTML = CONCERTS.map(c => {
    const dr = /-draft\./.test(c.pdf) ? ` <span class="dr">DRAFT</span>` : "";
    let n = 0;
    const items = c.pieces.map(p => p.brk
      ? `<li class="brk">Intermission</li>`
      : `<li value="${++n}"><div class="pt"><b>${esc(p.c)}</b> — ${esc(p.t)}</div>`
        + (p.m ? `<div class="mv">${esc(p.m)}</div>` : "")
        + `<div class="names">${p.who.map(w => nameChip(find, w, p.c)).join("")}</div></li>`).join("");
    return `<section id="${c.id}"><h2>${esc(c.day)}</h2>`
      + `<div class="cmeta">${esc(c.time)} · <a href="./map.html#${encodeURIComponent(c.poi)}">${esc(c.venue)}</a>`
      + ` · <a href="${c.pdf}" target="_blank" rel="noopener">original program ↗</a>${dr}</div>`
      + `<ol class="pieces">${items}</ol></section>`;
  }).join("");
  if(!(people||[]).length){ const m=$("#msg"); m.textContent="Kudos buttons appear once the roster has loaded — open online once."; m.hidden=false; }
  else $("#msg").hidden = true;
  if(location.hash){ const el = document.getElementById(location.hash.slice(1)); if(el) el.scrollIntoView(); }
  else scrollToday();
}

// With no explicit #jump, bring today's concert into view. When the day has two, show the first
// until 3h past its start, then the second — the one you're most likely walking into. Runs on
// every render, so a resume after that threshold advances the view (pure-pull: opening = refresh).
const pad2 = n => String(n).padStart(2, "0");
const clockMins = t => { const m = /(\d+):(\d+)\s*(am|pm)/i.exec(t) || []; let h = (+m[1]||0) % 12; if(/pm/i.test(m[3])) h += 12; return h*60 + (+m[2]||0); };
function scrollToday(){
  const d = new Date(), key = `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  const todays = CONCERTS.filter(c => c.id.startsWith(key)).sort((a,b) => clockMins(a.time) - clockMins(b.time));
  if(!todays.length) return;
  const now = d.getHours()*60 + d.getMinutes();
  const pick = todays.length > 1 && now >= clockMins(todays[0].time) + 180 ? todays[1] : todays[0];
  const el = document.getElementById(pick.id); if(el) el.scrollIntoView();
}

// log a kudos tap (sender + recipient uid) so Jason can gauge who's using it — see ping.js. The
// chip is an <a target=_blank>, so the page stays put and the enqueue runs before/after WhatsApp
// opens. Delegated on the stable #concerts div (render() only swaps its innerHTML).
$("#concerts").addEventListener("click", e => {
  const a = e.target.closest("a.duo");
  if(a && a.dataset.to && window.AKMPing) AKMPing.event("kudos", a.dataset.to, a.dataset.piece);
});

render(Roster.cached());
if(navigator.onLine) Roster.pull().then(render).catch(()=>{});
document.addEventListener("visibilitychange", () => {   // resume after days on the home screen → re-pull
  if(!document.hidden && navigator.onLine) Roster.pull().then(render).catch(()=>{});
});
</script>
<script src="./ping.js"></script>
</body>
</html>
